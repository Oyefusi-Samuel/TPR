controller_manager:
  ros__parameters:
    update_rate: 100

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    ar_gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - ar4_joint_1
      - ar4_joint_2
      - ar4_joint_3
      - ar4_joint_4
      - ar4_joint_5
      - ar4_joint_6
    command_interfaces:
      - position
    state_interfaces:
      - position

ar_gripper_controller:
  ros__parameters:
    joints:
      - ar4_gripper_jaw1_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
